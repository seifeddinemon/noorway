<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoorWay Premium - تجربة فاخرة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="premium_theme.css">
</head>

<body>
    <div class="iphone-mockup">
        <div class="pattern-overlay"></div>

        <div class="status-bar">
            <span>9:41</span>
            <div style="display: flex; gap: 8px; align-items: center;">
                <span style="font-size: 12px;">📶</span>
                <span style="font-size: 12px;">🔋</span>
            </div>
        </div>

        <div class="dashboard">
            <div class="header">
                <div class="greeting">
                    <h1>السلام عليكم، محمد</h1>
                    <p>١٠ رمضان ١٤٤٧ هـ</p>
                </div>
                <div class="glass-card"
                    style="padding: 0; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 16px;">
                    <span style="font-size: 24px;">👤</span>
                </div>
            </div>

            <div class="glass-card prayer-time-main">
                <span class="next-prayer">الصلاة القادمة: الظهر</span>
                <div class="time">12:30 م</div>
                <p style="margin: 0; font-size: 13px; opacity: 0.8; font-weight: 300;">متبقي ساعتين و ١٥ دقيقة</p>
            </div>

            <div class="grid-menu">
                <div class="glass-card menu-item">
                    <div class="icon-holder">📖</div>
                    <span>القرآن الكريم</span>
                </div>
                <div class="glass-card menu-item">
                    <div class="icon-holder">📿</div>
                    <span>الأذكار</span>
                </div>
                <div class="glass-card menu-item">
                    <div class="icon-holder">🧭</div>
                    <span>القبلة</span>
                </div>
                <div class="glass-card menu-item">
                    <div class="icon-holder">🌙</div>
                    <span>رمضانيات</span>
                </div>
            </div>

            <div class="glass-card" style="display: flex; align-items: center; gap: 16px; padding: 16px 20px;">
                <div class="icon-holder"
                    style="width: 44px; height: 44px; font-size: 20px; background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%);">
                    ⭐</div>
                <div style="flex: 1;">
                    <span style="font-weight: 700; font-size: 14px; display: block;">ورد اليوم</span>
                    <p style="margin: 2px 0 0 0; font-size: 12px; opacity: 0.7; font-weight: 300;">سورة الكهف - صفحة ١٥
                    </p>
                </div>
                <div style="font-size: 12px; color: var(--gold-primary); font-weight: 600;">متابعة ➔</div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active">🏠</div>
            <div class="nav-item">📚</div>
            <div class="nav-item center-btn">🕌</div>
            <div class="nav-item">📊</div>
            <div class="nav-item">⚙️</div>
        </div>
    </div>
</body>

</html>
