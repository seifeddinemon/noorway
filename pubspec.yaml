name: noorway
description: "نور الإيمان / NoorFaith - A premium comprehensive Islamic application."
publish_to: 'none'

version: 1.0.1+5

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  vibration: ^3.1.8
  flutter_svg: ^2.2.3
  google_fonts: ^6.2.1
  intl: ^0.20.2
  flutter_launcher_icons: ^0.14.4
  flutter_localizations:
    sdk: flutter
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_qiblah: ^3.2.0
  quran: ^1.4.1
  audioplayers: ^6.5.1
  hijri: ^3.0.0
  http: ^1.6.0
  youtube_player_flutter: ^9.1.3
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  permission_handler: ^11.3.1
  
dependency_overrides:
  device_info_plus: ^10.0.0
  package_info_plus: ^8.0.0
  objective_c: 9.2.1
  path_provider_foundation: 2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/patterns/
    - assets/audio/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_noorfaith.png"
  adaptive_icon_background: "#083B2E"  # AppColors.primaryEmerald
  adaptive_icon_foreground: "assets/images/logo_noorfaith.png"
